name: Update Bilibili Transcript RSS
env:
  # GitHub Actions 启动时把 secrets 注入内存变量，日志会自动打码（***）
  BILI_RAW_COOKIES: ${{ secrets.BILI_RAW_COOKIES }}

on:
  schedule:
    # 一天 3 次：UTC 00:00 / 08:00 / 16:00
    # = 北京时间 08:00（早）/ 16:00（午后）/ 次日 00:00（深夜）
    - cron: "0 0,8,16 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 先单独跑一次健康检查，方便在 Actions 详情页第一眼看到 cookie 状态
      # 即使 cookie 失效，也继续执行后续步骤把 health.json push 上去，
      # 否则外部探测接口永远看不到失败状态。
      - name: Cookie health check
        id: health
        continue-on-error: true
        run: python scripts/check_cookie.py

      - name: Run feed builder
        id: build
        continue-on-error: true
        run: python scripts/fetch_and_build.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs state
          if git diff --cached --quiet; then
            echo "无变更需要提交"
          else
            git commit -m "Update feeds [skip ci]"
            git push
          fi

      # 这一步必须放在最后：如果前面健康检查或抓取失败了，让整个 workflow
      # 也以失败状态结束，触发 GitHub 通知 / 邮件，方便你刷 cookie
      - name: Fail job if any earlier step failed
        if: steps.health.outcome == 'failure' || steps.build.outcome == 'failure'
        run: |
          echo "::error ::Cookie 健康检查或抓取失败，请检查 docs/health.json 与上方日志"
          exit 1
